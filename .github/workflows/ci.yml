name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
      - fix
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    name: Автоматизированные тесты
    runs-on: ubuntu-latest
    
    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4
      
      - name: Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Установка зависимостей
        run: npm ci
      
      - name: Запуск веб-сервера
        run: |
          npx http-server src -p 8080 &
          sleep 3
      
      - name: Запуск тестов
        run: npm test
        env:
          CI: true

  deploy:
    name: Деплой на GitHub Pages
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4
      
      - name: Настройка страницы для деплоя
        run: |
          mkdir -p deploy
          cp src/index.html deploy/
      
      - name: Деплой на GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages