name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
      - fix
      - 'feature/**'
      - 'bugfix/**'
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    name: Автоматизированные тесты
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Клонирование репозитория
        uses: actions/checkout@v4
      
      - name: 🟢 Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: 📦 Установка зависимостей
        run: npm ci
      
      - name: 🌐 Установка Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
      
      - name: 🚀 Запуск веб-сервера
        run: |
          npx http-server src -p 8080 &
          sleep 2
      
      - name: 🧪 Запуск тестов
        run: npm test
        env:
          CI: true
      
      - name: 📊 Сохранение результатов тестов
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results/
            screenshots/

  deploy:
    name: Деплой на GitHub Pages
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Клонирование репозитория
        uses: actions/checkout@v4
      
      - name: 🔧 Настройка страницы для деплоя
        run: |
          mkdir -p deploy
          cp src/index.html deploy/
      
      - name: 🚀 Деплой на GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages