name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
      - fix
  pull_request:
    branches:
      - main
      - dev

# Разрешаем деплой
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    name: Автоматизированные тесты
    runs-on: ubuntu-latest
    
    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4
      
      - name: Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Установка зависимостей
        run: npm ci
      
      - name: Запуск веб-сервера
        run: |
          npx http-server src -p 8080 &
          sleep 3
      
      - name: Запуск тестов
        run: npm test
        env:
          CI: true

  deploy:
    name: Деплой на GitHub Pages
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4
      
      - name: Настройка Pages
        uses: actions/configure-pages@v4
      
      - name: Подготовка файлов для деплоя
        run: |
          mkdir -p _site
          cp src/index.html _site/
      
      - name: Загрузка на Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      
      - name: Деплой на GitHub Pages
        uses: actions/deploy-pages@v4